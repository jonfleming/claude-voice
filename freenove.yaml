substitutions:
  device_name: aipi
  device_friendly_name: AiPi
  display_model: st7796
  display_id: main_display
  display_clk_pin: GPIO47
  display_mosi_pin: GPIO21
  display_dc_pin: GPIO45
  display_reset_pin: GPIO20
  # CS is not used → leave blank and omit from display block
  # display_cs_pin: -1
  display_dimensions: 320x480
  display_rotation: 90
  display_invert_colors: false
  display_auto_clear_enabled: false
  display_update_interval: never
  lcd_backlight_pin: GPIO2
  leds_pin: GPIO48
  right_button_pin: GPIO42

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly_name}

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "F87bASZ+ovbq/A2P/Abx0wlwR9zmf+4A3g77NRGAu8k="

ota:
  - platform: esphome
    password: "2d11298bcb4263d29423bcb75a949a27"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Enable fallback AP
  ap:
    ssid: ${device_friendly_name} Fallback Hotspot

captive_portal:

web_server:
  port: 80

esp32:
  variant: esp32s3
  framework:
    type: esp-idf
  flash_size: 16MB

font:
  - file: "gfonts://Roboto"
    id: my_font
    size: 22

# Setup SPI communcation for LCD display
spi:
  clk_pin: ${display_clk_pin}
  mosi_pin: ${display_mosi_pin}
  # ST7796 is write-only → no MISO pin

display:
  - platform: ili9xxx
    model: ${display_model}
    id: ${display_id}

    dc_pin: ${display_dc_pin}
    reset_pin: ${display_reset_pin}

    # DO NOT include cs_pin because TFT_CS = -1
    # cs_pin: ${display_cs_pin}

    dimensions: ${display_dimensions}
    rotation: ${display_rotation}
    invert_colors: ${display_invert_colors}
    auto_clear_enabled: ${display_auto_clear_enabled}
    update_interval: ${display_update_interval}

# Basic LVGL widget
lvgl:
  widgets:
    - label:
        id: va_state_label
        align: CENTER
        text: "Idle"
        text_font: my_font
        text_color: blue

# Add switches for the LCD backlight and power latch
switch:
  - platform: gpio
    id: lcd_backlight
    name: "LCD Backlight"
    pin:
      number: ${lcd_backlight_pin}
    restore_mode: RESTORE_DEFAULT_ON

# Simple push‑to‑talk button (optional: Freenove navigation switch up‑key)
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT_PULLUP
    name: "Button"
    on_press:
      then:
        - if:
            condition:
              voice_assistant.is_running:
            then:
              - logger.log: "Button short press: stopping voice assistant capture."
              - voice_assistant.stop:
            else:
              - logger.log: "Button short press: starting voice assistant capture."
              - voice_assistant.start:

# Optional: onboard LED as status
light:
  - platform: status_led
    name: "Voice Assistant Status LED"
    id: status_light
    pin:
      number: ${leds_pin}
      inverted: true

i2s_audio:
  - id: i2s_mic_bus
    i2s_lrclk_pin: 14
    i2s_bclk_pin: 3
  - id: i2s_speaker_bus
    i2s_lrclk_pin: 41
    i2s_bclk_pin: 42
    
microphone:
  - platform: i2s_audio
    id: mic
    i2s_audio_id: i2s_mic_bus
    i2s_din_pin: 46
    sample_rate: 16000
    bits_per_sample: 32bit   # INMP441 is 24-bit, ESPHome uses 32-bit
    adc_type: external
    

speaker:
  - platform: i2s_audio
    dac_type: external    
    id: speak
    i2s_audio_id: i2s_speaker_bus
    i2s_dout_pin: 1
    sample_rate: 16000
    bits_per_sample: 16bit

# Setup a media payer so Home Assistant can play audio
# Comment out files if not using beep.wav
# Setting volume to higher than 80% causes a lot of distortion, 70-75% is a good max
media_player:
  - platform: speaker
    name: "ESPHome I2S Media Player"
    id: speaker_media_player_id
    buffer_size: 50000
    announcement_pipeline:
      speaker: speak
      num_channels: 1
    files:
      - id: beep
        file: "beep.wav"

voice_assistant:
  microphone: mic
  speaker: speak
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_listening:
    - light.turn_on:
        id: status_light
        red: 0%
        green: 0%
        blue: 100%
    - lvgl.label.update:
        id: va_state_label
        text: "Listening"
  on_start:
    - lvgl.label.update:
        id: va_state_label
        text: "Capture"
    - logger.log: "Voice assistant started"
  on_stt_end:
    - light.turn_on:
        id: status_light
        red: 100%
        green: 100%
        blue: 100%
    - lvgl.label.update:
        id: va_state_label
        text: "Thinking"
  on_end:
    - light.turn_off: status_light
    - lvgl.label.update:
        id: va_state_label
        text: "Idle"
    - logger.log: "Voice assistant finished"
  on_tts_start:
    - light.turn_on:
        id: status_light
        red: 0%
        green: 100%
        blue: 0%
    - lvgl.label.update:
        id: va_state_label
        text: "Speaking"
  on_error:
    - light.turn_on:
        id: status_light
        red: 100%
        green: 0%
        blue: 0%
    - lvgl.label.update:
        id: va_state_label
        text: "Error"
    - logger.log:
        format: "Voice assistant error (%d): %s"
        args: [code, message.c_str()]
